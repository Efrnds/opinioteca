# Nginx — proxy HTTP + WebSocket para Opinioteca
#
# O front (Next.js) e a API Go precisam estar acessíveis.
# O WebSocket do backend escuta em GET /ws (upgrade).
#
# Ajuste upstreams conforme seu deploy:
#   - next: porta do Next (ex. 3000)
#   - api:  porta do Go   (ex. 4668)

upstream opinioteca_next {
    server 127.0.0.1:3000;
}

upstream opinioteca_api {
    server 127.0.0.1:4668;
}

server {
    listen 443 ssl http2;
    server_name opinioteca.prismapp.com.br;

    # ssl_certificate ...;
    # ssl_certificate_key ...;

    client_max_body_size 20M;

    # WebSocket — obrigatório para notificações/mensagens em tempo real
    location /ws {
        proxy_pass http://opinioteca_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # API REST (se exposta no mesmo domínio)
    location /api/ {
        proxy_pass http://opinioteca_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Rotas diretas do backend Go (login, avaliacoes, upload, etc.)
    location ~ ^/(login|usuarios|avaliacoes|livros|mensagens|notificacoes|diario|upload|citacoes|pesquisa|ws) {
        proxy_pass http://opinioteca_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js
    location / {
        proxy_pass http://opinioteca_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# map para upgrade condicional (incluir no http { } do nginx principal se ainda não existir):
