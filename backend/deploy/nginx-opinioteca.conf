# Nginx / OpenResty: proxy HTTP + WebSocket para Opinioteca
#
# O front conecta em wss://SEU_DOMINIO/ws?token=JWT
# Sem o bloco /ws com Upgrade, o browser falha com:
#   "Firefox can't establish a connection to the server at wss://..."
#
# Ajuste upstreams conforme o deploy:
#   - next: porta do Next (ex. 3000)
#   - api:  porta do Go   (ex. 4668)
#
# IMPORTANTE (http {} do nginx principal — obrigatório se usar $connection_upgrade):
# map $http_upgrade $connection_upgrade {
#     default upgrade;
#     ''      close;
# }
#
# =============================================================================
# Nginx Proxy Manager (opinioteca.prismapp.com.br) — SESSION BLEED
# =============================================================================
# Sintoma: usuário nunca visitou o site e já aparece logado como outra pessoa;
#          ou após login cai na conta de outro.
#
# CAUSA #1 (mais provável): Proxy Host → "Cache Assets" = ON
#   O NPM cacheia respostas HTML/JSON (incl. /api/auth/session e Set-Cookie).
#   Visitante B recebe a sessão/HTML de A.
#
# OBRIGATÓRIO neste host:
#   [ ] Cache Assets: OFF (desligar por completo)
#   [ ] Purge cache do host após desligar
#   [ ] Não cachear paths com Cookie / Set-Cookie / /api/auth/*
#   [ ] Force SSL: ON (ok)
#   [ ] /ws → backend Go com Upgrade (ok se já configurado)
#
# CAUSA #2: AUTH_SECRET igual ao de calmera-os (ou outro app) + cookie Domain=.prismapp.com.br
#   [ ] AUTH_SECRET único só da Opinioteca (gerar novo e redeploy)
#   [ ] Cookie Domain NÃO deve ser .prismapp.com.br (host-only / __Host-)
#
# Após deploy do front: cookies passam a __Host-opinioteca.session-token
# =============================================================================

upstream opinioteca_next {
    server 127.0.0.1:3000;
}

upstream opinioteca_api {
    server 127.0.0.1:4668;
}

server {
    listen 443 ssl http2;
    server_name opinioteca.prismapp.com.br;

    # ssl_certificate ...;
    # ssl_certificate_key ...;

    client_max_body_size 20M;

    # ^~ impede que o location regex abaixo capture /ws sem headers de upgrade.
    # Connection "upgrade" fixo: não depende do map $connection_upgrade.
    location ^~ /ws {
        proxy_pass http://opinioteca_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    # API REST (se exposta no mesmo domínio)
    location /api/ {
        proxy_pass http://opinioteca_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Rotas diretas do backend Go (sem /ws — já coberto acima)
    location ~ ^/(login|usuarios|avaliacoes|livros|mensagens|notificacoes|diario|upload|citacoes|pesquisa) {
        proxy_pass http://opinioteca_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js
    location / {
        proxy_pass http://opinioteca_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
